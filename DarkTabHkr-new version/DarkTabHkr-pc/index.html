<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>New Tab</title>
  <link rel="stylesheet" href="style.css" />
  <!-- FontAwesome for camera icon -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" />
</head>

<body>
  <div class="overlay">
    <h1 class="greeting" id="greeting">Hello</h1>

    <!-- Todo Toggle Icon -->
    <div id="todo-toggle">
      <svg id="todo-icon" fill="var(--accent)" width="32" height="32" viewBox="0 0 32 32"
        xmlns="http://www.w3.org/2000/svg">
        <path
          d="M30 14.75h-17c-0.69 0-1.25 0.56-1.25 1.25s0.56 1.25 1.25 1.25v0h17c0.69 0 1.25-0.56 1.25-1.25s-0.56-1.25-1.25-1.25v0zM13 6.25h17c0.69 0 1.25-0.56 1.25-1.25s-0.56-1.25-1.25-1.25v0h-17c-0.69 0-1.25 0.56-1.25 1.25s0.56 1.25 1.25 1.25v0zM6 22.75h-2c-1.794 0.002-3.248 1.456-3.25 3.25v2c0.002 1.794 1.456 3.248 3.25 3.25h2c1.794-0.002 3.248-1.456 3.25-3.25v-2c-0.002-1.794-1.456-3.248-3.25-3.25h-0zM6.75 28c-0 0.414-0.336 0.75-0.75 0.75h-2c-0.414-0-0.75-0.336-0.75-0.75v-2c0-0.414 0.336-0.75 0.75-0.75h2c0.414 0 0.75 0.336 0.75 0.75v0zM30 25.75h-17c-0.69 0-1.25 0.56-1.25 1.25s0.56 1.25 1.25 1.25v0h17c0.69 0 1.25-0.56 1.25-1.25s-0.56-1.25-1.25-1.25v0zM9.078 11.877l-5.121 5.598-1.076-1.069c-0.226-0.225-0.537-0.363-0.881-0.363-0.69 0-1.25 0.559-1.25 1.25 0 0.346 0.141 0.66 0.369 0.886l2 1.988 0.022 0.015 0.015 0.021c0.073 0.059 0.156 0.112 0.246 0.153l0.007 0.003c0.038 0.028 0.082 0.055 0.128 0.080l0.006 0.003c0.135 0.056 0.292 0.088 0.457 0.088 0.175 0 0.341-0.037 0.491-0.103l-0.008 0.003c0.053-0.031 0.098-0.061 0.14-0.094l-0.003 0.002c0.102-0.050 0.189-0.11 0.268-0.179l-0.001 0.001 0.015-0.023 0.020-0.014 6-6.559c0.205-0.222 0.331-0.52 0.331-0.847 0-0.69-0.56-1.25-1.25-1.25-0.366 0-0.696 0.158-0.924 0.409l-0.001 0.001zM9.078 0.877l-5.121 5.598-1.076-1.069c-0.226-0.223-0.536-0.361-0.878-0.361-0.69 0-1.25 0.56-1.25 1.25 0 0.345 0.14 0.658 0.366 0.884v0l2 1.987 0.022 0.015 0.015 0.021c0.072 0.058 0.153 0.109 0.24 0.15l0.007 0.003c0.040 0.029 0.086 0.058 0.134 0.084l0.007 0.003c0.135 0.056 0.292 0.088 0.456 0.088 0.175 0 0.341-0.037 0.491-0.103l-0.008 0.003c0.053-0.031 0.098-0.061 0.14-0.094l-0.003 0.002c0.102-0.050 0.189-0.11 0.268-0.179l-0.001 0.001 0.015-0.023 0.020-0.014 6-6.559c0.206-0.222 0.332-0.521 0.332-0.848 0-0.69-0.56-1.25-1.25-1.25-0.367 0-0.697 0.158-0.925 0.41l-0.001 0.001z" />
      </svg>
    </div>

    <!-- Google Apps Icon -->
    <div id="google-apps-wrapper">
      <button id="google-apps-btn" aria-label="Open Google Apps menu">
        <div class="dot-row">
          <span class="dot"></span><span class="dot"></span><span class="dot"></span>
        </div>
        <div class="dot-row">
          <span class="dot"></span><span class="dot"></span><span class="dot"></span>
        </div>
        <div class="dot-row">
          <span class="dot"></span><span class="dot"></span><span class="dot"></span>
        </div>
      </button>

      <div id="google-apps-popup" role="menu" aria-hidden="true">

        <a href="https://docs.google.com/" class="app-icon">
          <img src="docs.png" alt="Docs" />
        </a>


        <a href="https://sheets.google.com" rel="noopener" class="app-icon">
          <img src="sheets.png" alt="Sheets" />
        </a>

        <a href="https://slides.google.com" rel="noopener" class="app-icon">
          <img src="slides.png" alt="Slides" />
        </a>
        <a href="https://calendar.google.com" rel="noopener" class="app-icon">
          <img src="calender.png" alt="Calendar" />
        </a>
        <a href="https://maps.google.com" rel="noopener" class="app-icon">
          <img src="maps.png" alt="Maps" />
        </a>
        <a href="https://meet.google.com/landing?hs=197&authuser=0" rel="noopener" class="app-icon">
          <img src="meet.png" alt="Meet" />
        </a>
        <a href="https://translate.google.com/?sl=bn&tl=en&op=translate" rel="noopener" class="app-icon">
          <img src="trans.png" alt="Translate" />
        </a>
        <a href="https://photos.google.com" rel="noopener" class="app-icon">
          <img src="photos.png" alt="Photos" />
        </a>
        <a href="https://myaccount.google.com" rel="noopener" class="app-icon">
          <img src="account.png" alt="Account" />
        </a>
      </div>
    </div>

    <!-- Collapsible Todo Panel -->
    <div id="todo-panel">
      <h3>Tasks</h3>
      <form id="todo-form">
        <input id="todo-input" type="text" placeholder="Add a task..." autocomplete="off" />
        <button type="submit">Add</button>
      </form>
      <ul id="todo-list"></ul>
    </div>

    <main class="main-layout" role="main">
      <!-- Left side: Clock + Search -->
      <section class="left">
        <article class="card clock-card">
          <time id="clock">00:00</time>
          <div id="date">Loading...</div>
        </article>

        <article class="card search-card">
          <form id="search-form">
            <div class="search-bar">
              <input type="search" placeholder="Search the web..." />
              <button type="submit">Search</button>

            </div>


            <div class="engine-icons">
              <button type="button">G</button>
              <button type="button">B</button>
              <button type="button">D</button>
              <button type="button">Y</button>
              <button type="button">I</button>
              <button type="button">YA</button>
              <button type="button">YI</button>
              <button type="button">S</button>
            </div>
          </form>
        </article>
      </section>

      <!-- Right side: Bookmarks -->
      <section class="bookmarks-grid" aria-label="Bookmarks">
        <div class="bookmark-card small" title="Google Drive" style="--border:#4285F4;"
          data-link="https://drive.google.com">
          <img src="drive.png" alt="Google Drive" />
        </div>
        <div class="bookmark-card big" title="Gmail" style="--border:#D93025;" data-link="https://mail.google.com">
          <img src="gmail.png" alt="Gmail" />
        </div>
        <div class="bookmark-card small" title="Hack the Box" style="--border:#2EC866;"
          data-link="https://account.hackthebox.com/dashboard">
          <img src="hack.png" alt="Hack The Box" />
        </div>
        <div class="bookmark-card small" title="Facebook" style="--border:#1877F2;"
          data-link="https://www.facebook.com">
          <img src="fb.png" alt="Facebook" />
        </div>

        <div class="bookmark-card small" title="Google Classroom" style="--border:#e1e81a;"
          data-link="https://portswigger.net/web-security">
          <img src="academic.png" alt="portswigger" />
        </div>

        <div class="bookmark-card small" title="WhatsApp" style="--border:#25D366;"
          data-link="https://web.whatsapp.com">
          <img src="whtasapp.png" alt="WhatsApp" />
        </div>
        <div class="bookmark-card small" title="GitHub" style="--border:#ffffff;" data-link="https://github.com">
          <img src="git.png" alt="GitHub" />
        </div>


        <div class="bookmark-card small" title="Discord" style="--border:#9099ff;"
          data-link="https://discord.com/channels/@me">
          <img src="discord.png" alt="Discord" />
        </div>
        <div class="bookmark-card big" title="TryHackMe" style="--border:#ffb813;"
          data-link="https://tryhackme.com/welcome">
          <img src="code.png" alt="TryHackMe" />
        </div>

        <div class="bookmark-card small" title="ChatGPT" style="--border:#00eeff;" data-link="https://chat.openai.com">
          <img src="gpt.png" alt="ChatGPT" />
        </div>

        <div class="bookmark-card big" title="Dev.to" style="--border:#a200ff;" data-link="https://dev.to">
          <img src="dev.png" alt="Dev.to" />
        </div>
        <div class="bookmark-card small" title="YouTube" style="--border:#FF0000;" data-link="https://www.youtube.com">
          <img src="yt.png" alt="YouTube" />
        </div>


      </section>
    </main>

    <div id="settings-btn">
      ✎
    </div>

    <div id="settings-panel">

      <h4>Theme</h4>

      <label>Accent Color</label>
      <input type="color" id="color-picker">

      <label>Background</label>
      <input type="file" id="bg-picker" accept="image/*">

      <hr style="border-color:var(--accent);opacity:0.3;margin:4px 0;">

      <h4>Bookmarks</h4>
      <label>Select Bookmark</label>
      <select id="bookmark-select"
        style="background:#111;color:#fff;border:1px solid var(--accent);border-radius:6px;padding:4px 6px;"></select>

      <label>URL</label>
      <input type="text" id="bookmark-url-input" placeholder="https://..."
        style="background:#111;color:#fff;border:1px solid var(--accent);border-radius:6px;padding:4px 6px;">

      <label>Image (URL or upload)</label>
      <input type="text" id="bookmark-img-url" placeholder="https://...image.png"
        style="background:#111;color:#fff;border:1px solid var(--accent);border-radius:6px;padding:4px 6px;">
      <input type="file" id="bookmark-img-file" accept="image/*">

      <button id="bookmark-save-btn"
        style="background:var(--accent);color:#000;border:none;padding:6px 10px;border-radius:6px;font-weight:bold;cursor:pointer;">Save</button>
      <button id="bookmark-reset-btn"
        style="background:#222;color:var(--accent);border:1px solid var(--accent);padding:6px 10px;border-radius:6px;cursor:pointer;">Reset
        to Default</button>

    </div>

    <footer id="motivation">yoo boy want some fun?...</footer>
  </div>

  <script src="script.js" defer></script>
</body>

</html>
